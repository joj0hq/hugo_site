<!DOCTYPE html>
<html lang="{{ site.Language.LanguageCode | default site.Language.Lang }}" dir="{{ .Language.LanguageDirection | default "ltr" }}">
<head>
{{- partial "head.html" . }}
</head>
<body>
  <a class="skip-link" href="#main">{{ i18n "skip_to_content" }}</a>
  <div class="scroll-progress" data-scroll-progress aria-hidden="true"></div>
  {{- partial "nav.html" . }}
  <main id="main">
    {{- block "main" . }}{{ end }}
  </main>
  {{- partial "footer.html" . }}
  <button class="to-top-float" data-top data-top-float aria-label="{{ i18n "back_to_top" }}" title="{{ i18n "back_to_top" }}">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 19V5M6 11l6-6 6 6"/></svg>
  </button>
</body>
</html>
